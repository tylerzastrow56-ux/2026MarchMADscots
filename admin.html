async function sbFetch(path,method='GET',body=null,extra={}){
  const headers={
    'apikey':SUPA_KEY,
    'Authorization':'Bearer '+SUPA_KEY,
    'Content-Type':'application/json',
    ...extra
  };
  // Only add Prefer header for POST/PATCH
  if(method==='POST'||method==='PATCH') headers['Prefer']='return=representation';
  const opts={method,headers};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SUPA_URL+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(r.status+': '+e);}
  const t=await r.text();return t?JSON.parse(t):null;
}

async function loadAll(){
  try{
    const [rRows,bRows,mRows]=await Promise.all([
      sbFetch('/rest/v1/results?select=*'),
      sbFetch('/rest/v1/brackets?select=id,player_name,champion,submitted,created_at&order=created_at.asc'),
      sbFetch('/rest/v1/mascots?select=*')
    ]);
    results={};
    (rRows||[]).forEach(r=>{results[r.game_id]=r.winning_team;});
    brackets=bRows||[];
    mascots={};
    (mRows||[]).forEach(m=>{mascots[m.team_key]=m.img_base64;});
    // Populate later round labels from actual results
    populateLaterRounds();
    buildUI();
  }catch(e){
    alert('Load failed: '+e.message);
  }
}

// Fill in actual team names for R32+ games based on entered results
function populateLaterRounds(){
  ALL_GAMES.forEach(g=>{
    if(g.roundNum===0)return; // R64 already has real names
    // Replace "XX Winner" labels with actual winner if known
    const t1ref=g.team1.replace(' Winner','');
    const t2ref=g.team2.replace(' Winner','');
    if(results[t1ref]) g.team1=results[t1ref];
    if(results[t2ref]) g.team2=results[t2ref];
  });
}

function buildUI(){
  const regions=['East','South','West','Midwest','Final Four','Championship'];
  let resultsHtml=`
    <div class="hint">Click a team name to set them as the winner. Change any result by clicking the other team. Results save instantly.</div>`;

  regions.forEach(region=>{
    const games=ALL_GAMES.filter(g=>g.region===region);
    resultsHtml+=`<div class="region-label">${region}</div>`;
    games.forEach(g=>{
      const winner=results[g.id]||'';
      const isSet=!!winner;
      const t1checked=winner===g.team1?'checked':'';
      const t2checked=winner===g.team2?'checked':'';
      resultsHtml+=`<div class="game-row ${isSet?'is-set':''}" id="row-${g.id}">
        <div class="game-meta">
          <div class="game-id">${g.id}</div>
          <div class="game-desc">${g.round}</div>
          ${isSet?`<span class="winner-tag">&#10003; ${winner}</span>
            <button class="clear-btn" onclick="clearResult('${g.id}')">&#10005; Clear</button>`
          :''}
        </div>
        <div class="team-options">
          <div class="team-opt">
            <input type="radio" name="game-${g.id}" id="r-${g.id}-1" value="${g.team1}" ${t1checked} onchange="saveResult('${g.id}','${g.team1}')">
            <label for="r-${g.id}-1">
              ${g.seed1?`<span class="seed-sm">(${g.seed1})</span>`:''}<span>${g.team1}</span>
            </label>
          </div>
          <div class="team-opt">
            <input type="radio" name="game-${g.id}" id="r-${g.id}-2" value="${g.team2}" ${t2checked} onchange="saveResult('${g.id}','${g.team2}')">
            <label for="r-${g.id}-2">
              ${g.seed2?`<span class="seed-sm">(${g.seed2})</span>`:''}<span>${g.team2}</span>
            </label>
          </div>
        </div>
      </div>`;
    });
  });

  // Entries tab
  let entriesHtml=`
    <div class="hint">All submitted and in-progress brackets. Delete removes the entry permanently from the leaderboard.</div>`;
  if(brackets.length===0){
    entriesHtml+='<div style="text-align:center;padding:30px;color:#aaa;font-size:13px">No entries yet.</div>';
  }else{
    brackets.forEach(b=>{
      const dt=new Date(b.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      entriesHtml+=`<div class="entry-row">
        <div style="flex:1">
          <div class="entry-name">${b.player_name}</div>
          <div class="entry-champ">${b.champion?'&#9733; '+b.champion:'No champion yet'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="${b.submitted?'entry-submitted':'entry-draft'}">${b.submitted?'Submitted':'Draft'}</span>
          <span class="entry-meta">${dt}</span>
        </div>
        <button class="del-btn" onclick="deleteEntry('${b.id}','${b.player_name}')">Delete</button>
      </div>`;
    });
  }

  document.getElementById('root').innerHTML=`<div class="wrap">
    <div class="top-nav">
      <a href="index.html">&#8592; Bracket Picker</a>
      <a href="leaderboard.html">Leaderboard &rarr;</a>
    </div>
    <div class="tabs">
      <button class="tab ${curTab==='results'?'active':''}" onclick="switchTab('results')">Game Results</button>
      <button class="tab ${curTab==='entries'?'active':''}" onclick="switchTab('entries')">Entries (${brackets.length})</button>
      <button class="tab ${curTab==='mascots'?'active':''}" onclick="switchTab('mascots')">Mascots (${Object.keys(mascots).length}/68)</button>
    </div>
    <div id="tab-results" style="display:${curTab==='results'?'block':'none'}">${resultsHtml}</div>
    <div id="tab-entries" style="display:${curTab==='entries'?'block':'none'}">${entriesHtml}</div>
    <div id="tab-mascots" style="display:${curTab==='mascots'?'block':'none'}">${buildMascotsHtml()}</div>
  </div>`;
}

function switchTab(tab){
  curTab=tab;
  document.getElementById('tab-results').style.display=tab==='results'?'block':'none';
  document.getElementById('tab-entries').style.display=tab==='entries'?'block':'none';
  document.getElementById('tab-mascots').style.display=tab==='mascots'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
}

async function saveResult(gameId,winner){
  const game=ALL_GAMES.find(g=>g.id===gameId);
  try{
    await sbFetch('/rest/v1/results','POST',
      {game_id:gameId,winning_team:winner,round_num:game.roundNum,region:game.region},
      {'Prefer':'resolution=merge-duplicates,return=representation'});
    results[gameId]=winner;
    populateLaterRounds();
    buildUI();
  }catch(e){alert('Save failed: '+e.message);}
}

async function clearResult(gameId){
  if(!confirm('Clear result for '+gameId+'?'))return;
  try{
    await sbFetch(`/rest/v1/results?game_id=eq.${gameId}`,'DELETE');
    delete results[gameId];
    populateLaterRounds();
    buildUI();
  }catch(e){alert('Clear failed: '+e.message);}
}

async function deleteEntry(id,name){
  if(!confirm('Permanently delete the bracket for "'+name+'"?\nThis cannot be undone.'))return;
  try{
    await sbFetch(`/rest/v1/brackets?id=eq.${id}`,'DELETE');
    // Only update UI after confirmed server deletion
    brackets=brackets.filter(b=>b.id!==id);
    buildUI();
  }catch(e){
    console.error('Delete error:', e);
    alert('Delete failed: '+e.message+'\n\nMake sure you have run this in Supabase SQL Editor:\ncreate policy \"anyone can delete brackets\" on brackets for delete using (true);');
  }
}

function buildMascotsHtml(){
  let h='<div class="hint">Upload or update the mascot photo for any team. Paste a direct image URL or upload a file. Photos are stored permanently in the database and override the embedded photo in the bracket picker.</div>';
  const regions=['East','South','West','Midwest'];
  regions.forEach(region=>{
    const regionTeams=MASCOT_TEAMS.filter(t=>t.region===region);
    const regionUpgraded=regionTeams.filter(t=>mascots[t.key]).length;
    h+=`<div class="region-label">${region} &mdash; ${regionUpgraded}/${regionTeams.length} updated</div>`;
    h+='<div class="mascot-grid">';
    regionTeams.forEach(t=>{
    const hasUpgrade=!!mascots[t.key];
    const imgSrc=hasUpgrade?mascots[t.key]:'';
    h+=`<div class="mascot-card ${hasUpgrade?'has-upgrade':''}" id="mc-${t.key}">
      <div class="team-name"><span style="color:#aaa;font-size:10px;margin-right:4px">#${t.seed}</span>${t.label}</div>
      <div class="mascot-thumb-wrap">
        ${imgSrc?`<img src="${imgSrc}" alt="">`:'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa">No upgrade</div>'}
      </div>
      <div class="mascot-status ${hasUpgrade?'status-upgraded':'status-original'}">${hasUpgrade?'&#10003; Upgraded':'Original (low-res)'}</div>
      <div id="prev-wrap-${t.key}" class="preview-wrap"><img id="prev-img-${t.key}" src="" alt=""></div>
      <div class="mascot-actions">
        <input class="url-input" id="url-${t.key}" placeholder="Paste direct image URL..." 
          onpaste="setTimeout(()=>previewUrl('${t.key}'),50)"
          oninput="previewUrl('${t.key}')">
        <button class="mascot-btn" onclick="saveMascotUrl('${t.key}')">Fetch &amp; Save URL</button>
        <label class="file-label" for="file-${t.key}">&#128247; Upload Photo</label>
        <input type="file" id="file-${t.key}" accept="image/*" style="display:none" onchange="saveMascotFile('${t.key}',this)">
        ${hasUpgrade?`<button class="mascot-btn danger" onclick="removeMascot('${t.key}')">&#10005; Remove Upgrade</button>`:''}
      </div>
      <div class="mascot-msg" id="msg-${t.key}"></div>
    </div>`;
    });
    h+='</div>';
  });
  return h;
}

function previewUrl(key){
  const url=document.getElementById('url-'+key).value.trim();
  const pw=document.getElementById('prev-wrap-'+key);
  const pi=document.getElementById('prev-img-'+key);
  if(!url){pw.style.display='none';return;}
  pw.style.display='block';
  pi.src=url;
  pi.onerror=()=>{pw.style.display='none';};
}

async function saveMascotUrl(key){
  const url=document.getElementById('url-'+key).value.trim();
  const msg=document.getElementById('msg-'+key);
  if(!url){msg.textContent='Paste a URL first.';msg.style.color='#c00';return;}
  msg.textContent='Fetching...';msg.style.color='#888';
  try{
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('Could not fetch image ('+resp.status+')');
    const blob=await resp.blob();
    if(!blob.type.startsWith('image/'))throw new Error('URL is not an image');
    const b64=await blobToBase64(blob,450);
    await upsertMascot(key,b64);
    mascots[key]=b64;
    msg.textContent='\u2713 Saved!';msg.style.color='#080';
    setTimeout(()=>buildUI(),800);
  }catch(e){
    msg.textContent='Error: '+e.message;msg.style.color='#c00';
    console.error(e);
  }
}

async function saveMascotFile(key,input){
  const msg=document.getElementById('msg-'+key);
  if(!input.files||!input.files[0])return;
  msg.textContent='Processing...';msg.style.color='#888';
  try{
    const b64=await blobToBase64(input.files[0],450);
    await upsertMascot(key,b64);
    mascots[key]=b64;
    msg.textContent='\u2713 Saved!';msg.style.color='#080';
    setTimeout(()=>buildUI(),800);
  }catch(e){
    msg.textContent='Error: '+e.message;msg.style.color='#c00';
  }
}

async function removeMascot(key){
  if(!confirm('Remove the upgraded photo for '+key+'? The original embedded photo will be used instead.'))return;
  try{
    await sbFetch('/rest/v1/mascots?team_key=eq.'+key,'DELETE');
    delete mascots[key];
    buildUI();
  }catch(e){alert('Remove failed: '+e.message);}
}

async function upsertMascot(key,b64){
  await sbFetch('/rest/v1/mascots','POST',
    {team_key:key,img_base64:b64,updated_at:new Date().toISOString()},
    {'Prefer':'resolution=merge-duplicates,return=representation'});
}

function blobToBase64(blob,maxSize){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      // Resize via canvas
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxSize||h>maxSize){
          const r=Math.min(maxSize/w,maxSize/h);
          w=Math.round(w*r);h=Math.round(h*r);
        }
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.82));
      };
      img.onerror=()=>reject(new Error('Could not load image'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('Could not read file'));
    reader.readAsDataURL(blob);
  });
}
