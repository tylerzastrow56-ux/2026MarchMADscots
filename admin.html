<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — 2026 NCAA Mascot Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#fff;color:#000;padding-bottom:60px}
.hdr{background:#000;color:#fff;padding:14px 20px;text-align:center}
.hdr h1{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.hdr p{font-size:11px;color:#aaa;margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.wrap{max-width:700px;margin:0 auto;padding:20px 16px}
.login-box{max-width:360px;margin:60px auto;background:#f9f9f9;border:1px solid #ddd;border-radius:8px;padding:28px 24px;text-align:center}
.login-box h2{font-family:'Oswald',sans-serif;font-size:18px;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.login-box input{width:100%;font-size:14px;padding:10px 12px;border:1px solid #ccc;border-radius:4px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:#000}
.top-nav{display:flex;gap:16px;margin-bottom:4px;align-items:center;flex-wrap:wrap}
.top-nav a{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#000;text-decoration:none;border-bottom:1px solid #000}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #000}
.tab{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .12s}
.tab.active{color:#000;border-bottom-color:#000}
.tab:hover{color:#000}
.stitle{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#000;border-bottom:1px solid #000;padding-bottom:5px;margin:18px 0 10px}
.region-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;color:#888;text-transform:uppercase;margin:14px 0 6px}
.game-row{background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:10px 12px;margin-bottom:6px}
.game-row.is-set{border-color:#000;background:#f5f5f5}
.game-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.game-id{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;color:#aaa;width:32px;flex-shrink:0}
.game-desc{font-size:11px;color:#888;flex:1;line-height:1.3}
.winner-tag{font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;background:#000;color:#fff;padding:2px 6px;border-radius:2px;text-transform:uppercase}
.clear-btn{font-family:'Oswald',sans-serif;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:transparent;border:1px solid #ccc;color:#aaa;border-radius:3px;padding:3px 8px;cursor:pointer;transition:all .12s}
.clear-btn:hover{border-color:#c00;color:#c00}
.team-options{display:flex;gap:8px}
.team-opt{flex:1;position:relative}
.team-opt input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.team-opt label{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 8px;border:1px solid #ddd;border-radius:5px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;text-align:center;line-height:1.3;transition:all .12s;min-height:42px;color:#555;background:#fff}
.team-opt label:hover{border-color:#000;color:#000;background:#fafafa}
.team-opt input[type=radio]:checked + label{background:#000;color:#fff;border-color:#000}
.seed-sm{font-size:9px;font-weight:400;opacity:.6;margin-bottom:1px}
.entry-row{display:flex;align-items:center;background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:8px 12px;margin-bottom:6px;gap:10px}
.entry-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;flex:1}
.entry-champ{font-size:11px;color:#666;margin-top:2px}
.entry-meta{font-size:10px;color:#aaa;text-align:right}
.entry-submitted{font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;background:#000;color:#fff;padding:2px 6px;border-radius:2px;text-transform:uppercase}
.entry-draft{font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;border:1px solid #ccc;color:#aaa;padding:2px 6px;border-radius:2px;text-transform:uppercase}
.del-btn{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:transparent;border:1px solid #ccc;color:#aaa;border-radius:3px;padding:5px 10px;cursor:pointer;transition:all .12s;white-space:nowrap}
.del-btn:hover{border-color:#c00;color:#c00;background:#fff5f5}
.btn{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:3px;padding:8px 16px;cursor:pointer;border:1px solid #000;background:#000;color:#fff;transition:all .12s}
.btn:hover{background:#333}
.hint{font-size:11px;color:#888;margin-bottom:16px;line-height:1.5}
</style>
</head>

async function sbFetch(path,method,body,extra) {
  method = method||'GET'; extra = extra||{};
  var headers = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH') headers['Prefer']='return=representation';
  Object.keys(extra).forEach(function(k){headers[k]=extra[k];});
  var opts = {method:method,headers:headers};
  if(body) opts.body = JSON.stringify(body);
  var r = await fetch(SUPA_URL+path,opts);
  if(!r.ok){var e=await r.text();throw new Error(r.status+': '+e);}
  var t = await r.text();
  return t ? JSON.parse(t) : null;
}

function renderLogin() {
  document.getElementById('root').innerHTML =
    '<div class="login-box">' +
    '<h2>Admin Login</h2>' +
    '<input type="password" id="pwd" placeholder="Password...">' +
    '<button class="btn" style="width:100%;margin-top:8px" id="login-btn">Enter</button>' +
    '<div id="login-err" style="color:#c00;font-size:12px;margin-top:8px"></div>' +
    '</div>';
  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if(e.key === 'Enter') login();
  });
  document.getElementById('pwd').focus();
}

function login() {
  var pwd = document.getElementById('pwd').value;
  if(pwd === ADMIN_PWD) {
    loadAll();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password.';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

async function loadAll() {
  try {
    var rRows = await sbFetch('/rest/v1/results?select=*');
    var bRows = await sbFetch('/rest/v1/brackets?select=id,player_name,champion,submitted,created_at&order=created_at.asc');
    results = {};
    (rRows||[]).forEach(function(r) { results[r.game_id] = r.winning_team; });
    brackets = bRows||[];
    populateLaterRounds();
    buildUI();
  } catch(e) {
    alert('Load failed: ' + e.message);
  }
}

function populateLaterRounds() {
  ALL_GAMES.forEach(function(g) {
    if(g.roundNum === 0) return;
    var t1ref = g.team1.replace(' Winner','');
    var t2ref = g.team2.replace(' Winner','');
    if(results[t1ref]) g.team1 = results[t1ref];
    if(results[t2ref]) g.team2 = results[t2ref];
  });
}

function buildUI() {
  var regions = ['East','South','West','Midwest','Final Four','Championship'];
  var resultsHtml = '<div class="hint">Click a team to set them as winner. Results save instantly.</div>';

  regions.forEach(function(region) {
    var games = ALL_GAMES.filter(function(g) { return g.region === region; });
    resultsHtml += '<div class="region-label">' + region + '</div>';
    games.forEach(function(g) {
      var winner = results[g.id] || '';
      var isSet = !!winner;
      var t1checked = winner === g.team1 ? 'checked' : '';
      var t2checked = winner === g.team2 ? 'checked' : '';
      resultsHtml += '<div class="game-row ' + (isSet?'is-set':'') + '" id="row-' + g.id + '">';
      resultsHtml += '<div class="game-meta">';
      resultsHtml += '<div class="game-id">' + g.id + '</div>';
      resultsHtml += '<div class="game-desc">' + g.round + '</div>';
      if(isSet) {
        resultsHtml += '<span class="winner-tag">&#10003; ' + winner + '</span>';
        resultsHtml += '<button class="clear-btn" onclick="clearResult(\'' + g.id + '\')">&#10005; Clear</button>';
      }
      resultsHtml += '</div>';
      resultsHtml += '<div class="team-options">';
      resultsHtml += '<div class="team-opt">';
      resultsHtml += '<input type="radio" name="game-' + g.id + '" id="r-' + g.id + '-1" value="' + g.team1 + '" ' + t1checked + ' onchange="saveResult(\'' + g.id + '\',\'' + g.team1.replace(/'/g,"\\'") + '\')">';
      resultsHtml += '<label for="r-' + g.id + '-1">';
      if(g.seed1) resultsHtml += '<span class="seed-sm">(' + g.seed1 + ')</span>';
      resultsHtml += '<span>' + g.team1 + '</span></label></div>';
      resultsHtml += '<div class="team-opt">';
      resultsHtml += '<input type="radio" name="game-' + g.id + '" id="r-' + g.id + '-2" value="' + g.team2 + '" ' + t2checked + ' onchange="saveResult(\'' + g.id + '\',\'' + g.team2.replace(/'/g,"\\'") + '\')">';
      resultsHtml += '<label for="r-' + g.id + '-2">';
      if(g.seed2) resultsHtml += '<span class="seed-sm">(' + g.seed2 + ')</span>';
      resultsHtml += '<span>' + g.team2 + '</span></label></div>';
      resultsHtml += '</div></div>';
    });
  });

  var entriesHtml = '<div class="hint">All submitted and in-progress brackets. Delete removes the entry permanently.</div>';
  if(brackets.length === 0) {
    entriesHtml += '<div style="text-align:center;padding:30px;color:#aaa;font-size:13px">No entries yet.</div>';
  } else {
    brackets.forEach(function(b) {
      var dt = new Date(b.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      entriesHtml += '<div class="entry-row">';
      entriesHtml += '<div style="flex:1"><div class="entry-name">' + b.player_name + '</div>';
      entriesHtml += '<div class="entry-champ">' + (b.champion ? '&#9733; ' + b.champion : 'No champion yet') + '</div></div>';
      entriesHtml += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
      entriesHtml += '<span class="' + (b.submitted?'entry-submitted':'entry-draft') + '">' + (b.submitted?'Submitted':'Draft') + '</span>';
      entriesHtml += '<span class="entry-meta">' + dt + '</span></div>';
      entriesHtml += '<button class="del-btn" onclick="deleteEntry(\'' + b.id + '\',\'' + b.player_name.replace(/'/g,"\\'") + '\')">Delete</button>';
      entriesHtml += '</div>';
    });
  }

  document.getElementById('root').innerHTML =
    '<div class="wrap">' +
    '<div class="top-nav">' +
    '<a href="index.html">&#8592; Bracket Picker</a>' +
    '<a href="leaderboard.html">Leaderboard &rarr;</a>' +
    '</div>' +
    '<div class="tabs">' +
    '<button class="tab ' + (curTab==='results'?'active':'') + '" onclick="switchTab(this,\'results\')">Game Results</button>' +
    '<button class="tab ' + (curTab==='entries'?'active':'') + '" onclick="switchTab(this,\'entries\')">Entries (' + brackets.length + ')</button>' +
    '</div>' +
    '<div id="tab-results" style="display:' + (curTab==='results'?'block':'none') + '">' + resultsHtml + '</div>' +
    '<div id="tab-entries" style="display:' + (curTab==='entries'?'block':'none') + '">' + entriesHtml + '</div>' +
    '</div>';
}

function switchTab(btn, tab) {
  curTab = tab;
  document.getElementById('tab-results').style.display = tab==='results' ? 'block' : 'none';
  document.getElementById('tab-entries').style.display = tab==='entries' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
}

async function saveResult(gameId, winner) {
  var game = ALL_GAMES.find(function(g) { return g.id === gameId; });
  try {
    await sbFetch('/rest/v1/results', 'POST',
      {game_id:gameId, winning_team:winner, round_num:game.roundNum, region:game.region},
      {'Prefer':'resolution=merge-duplicates,return=representation'});
    results[gameId] = winner;
    populateLaterRounds();
    buildUI();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function clearResult(gameId) {
  if(!confirm('Clear result for ' + gameId + '?')) return;
  try {
    await sbFetch('/rest/v1/results?game_id=eq.' + gameId, 'DELETE');
    delete results[gameId];
    populateLaterRounds();
    buildUI();
  } catch(e) { alert('Clear failed: ' + e.message); }
}

async function deleteEntry(id, name) {
  if(!confirm('Permanently delete the bracket for "' + name + '"?\nThis cannot be undone.')) return;
  try {
    await sbFetch('/rest/v1/brackets?id=eq.' + id, 'DELETE');
    brackets = brackets.filter(function(b) { return b.id !== id; });
    buildUI();
  } catch(e) { alert('Delete failed: ' + e.message); }
}

renderLogin();
</script>
</body>
</html>
