const SUPA_URL='https://bfqvcnchmpyztovcgkbd.supabase.co',SUPA_KEY='sb_publishable_ucCXKlrFtpA5c-WoNUDpsQ_WwEzJg4W';
async function sbFetch(path,method='GET',body=null,extra={}){
  const opts={method,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':'',...extra}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SUPA_URL+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(r.status+': '+e);}
  const t=await r.text();return t?JSON.parse(t):null;
}
const db={
  async getResults(){return sbFetch('/rest/v1/results?select=*');},
  async upsertResult(d){return sbFetch('/rest/v1/results','POST',d,{'Prefer':'resolution=merge-duplicates,return=representation'});},
  async deleteResult(id){return sbFetch(`/rest/v1/results?game_id=eq.${id}`,'DELETE');}
};

const POINTS_BY_ROUND=[1,2,4,8,16,32];


const ADMIN_PWD = 'bracket2026';  // Change this to your preferred password
let results = {};  // game_id -> winning_team

function login() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === ADMIN_PWD) {
    renderAdmin();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password.';
  }
}

async function renderAdmin() {
  document.getElementById('root').innerHTML = '<div class="wrap"><div class="stitle">Loading results...</div></div>';
  try {
    const rows = await db.getResults();
    results = {};
    (rows||[]).forEach(r => { results[r.game_id] = r.winning_team; });
  } catch(e) {
    console.warn('Could not load results:', e.message);
  }
  buildUI();
}

function buildUI() {
  const regions = ['East','South','West','Midwest','Final Four','Championship'];
  let html = `<div class="wrap">
    <div class="top-nav">
      <a href="index.html">&#8592; Bracket Picker</a>
      <a href="leaderboard.html">Leaderboard &rarr;</a>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="stitle" style="margin:0">Enter Game Results</div>
      <div id="save-all-status" class="status-ok"></div>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:16px">Type the winning team name and click Set. Results are saved instantly to the database.</div>`;

  regions.forEach(region => {
    const games = ALL_GAMES.filter(g => g.region === region);
    html += `<div class="region-label">${region}</div>`;
    games.forEach(g => {
      const winner = results[g.id] || '';
      html += `<div class="game-row" id="row-${g.id}">
        <div class="game-id">${g.id}</div>
        <div class="game-label">${g.label}</div>
        ${winner
          ? `<div class="game-winner">${winner} <span class="tag-set">set</span></div>
             <button class="btn btn-clear" style="padding:4px 8px;font-size:10px" onclick="clearResult('${g.id}')">&#10005;</button>`
          : `<input class="winner-input" id="inp-${g.id}" placeholder="Winner..." onkeydown="if(event.key==='Enter')saveResult('${g.id}')">
             <button class="btn btn-fill" style="padding:5px 10px;font-size:10px" onclick="saveResult('${g.id}')">Set</button>`
        }
      </div>`;
    });
  });
  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

async function saveResult(gameId) {
  const inp = document.getElementById('inp-' + gameId);
  if (!inp) return;
  const winner = inp.value.trim();
  if (!winner) return;
  const game = ALL_GAMES.find(g => g.id === gameId);
  try {
    await db.upsertResult({ game_id: gameId, winning_team: winner, round_num: game.roundNum, region: game.region });
    results[gameId] = winner;
    buildUI();
  } catch(e) {
    alert('Save failed: ' + e.message);
  }
}

async function clearResult(gameId) {
  if (!confirm('Clear the result for ' + gameId + '?')) return;
  try {
    await db.deleteResult(gameId);
    delete results[gameId];
    buildUI();
  } catch(e) {
    alert('Clear failed: ' + e.message);
  }
}
</script>
