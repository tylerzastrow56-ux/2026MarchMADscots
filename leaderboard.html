<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard - 2026 NCAA Mascot Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#fff;color:#000;padding-bottom:60px}
.hdr{background:#fff;border-bottom:2px solid #000;padding:14px 20px 10px;text-align:center}
.hdr h1{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#000;letter-spacing:3px;text-transform:uppercase}
.hdr p{font-size:11px;color:#555;margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.wrap{max-width:800px;margin:0 auto;padding:16px 14px 60px}
.top-nav{display:flex;gap:16px;margin-bottom:16px;align-items:center}
.top-nav a{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#000;text-decoration:none;border-bottom:1px solid #000}
.refresh-btn{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:transparent;border:1px solid #000;color:#000;border-radius:3px;padding:5px 12px;cursor:pointer;margin-left:auto}
.refresh-btn:hover{background:#000;color:#fff}
.stats-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.stat-box{background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:10px 14px;flex:1;min-width:80px;text-align:center}
.stat-num{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:#000}
.stat-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;padding:6px 10px;text-align:left;border-bottom:2px solid #000;white-space:nowrap}
.lb-table th.r{text-align:right}
.lb-table td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:middle}
.data-row{cursor:pointer}
.data-row:hover td{background:#f9f9f9}
.rank{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;width:36px}
.pname{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase}
.champ{font-size:11px;color:#666}
.score{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;text-align:right}
.maxleft{font-size:10px;color:#aaa;text-align:right}
.prog-wrap{background:#eee;border-radius:2px;height:3px;margin-top:4px}
.prog-fill{background:#000;height:3px;border-radius:2px}
/* Expand panel */
.expand-row td{padding:0;border-bottom:none}
.expand-panel{background:#fafafa;border-bottom:1px solid #eee;padding:12px 14px}
.round-section{margin-bottom:10px}
.round-title{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}
.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px}
.pick-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;font-size:12px}
.pick-correct{background:#e8f5e9;border:1px solid #a5d6a7}
.pick-wrong{background:#ffebee;border:1px solid #ef9a9a}
.pick-pending{background:#fff;border:1px solid #e0e0e0}
.pick-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-correct{background:#2e7d32}
.dot-wrong{background:#c62828}
.dot-pending{background:#bbb}
.pick-team{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;font-size:11px}
.pick-team.wrong{text-decoration:line-through;color:#c62828}
.pick-team.correct{color:#1b5e20}
.pick-team.pending{color:#555}
.pick-gid{font-size:9px;color:#bbb;margin-left:auto;flex-shrink:0}
.msg{text-align:center;padding:40px 20px;font-size:14px;color:#888;font-family:'Oswald',sans-serif;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="hdr">
  <h1>2026 NCAA Mascot Bracket</h1>
  <p id="last-update">Leaderboard</p>
</div>
<div class="wrap">
  <div class="top-nav">
    <a href="index.html">&larr; Enter Bracket</a>
    <button class="refresh-btn" onclick="loadAll()">&#8635; Refresh</button>
  </div>
  <div id="content"><div class="msg">Loading&hellip;</div></div>
</div>
<script>
var SUPA_URL='https://bfqvcnchmpyztovcgkbd.supabase.co';
var SUPA_KEY='sb_publishable_ucCXKlrFtpA5c-WoNUDpsQ_WwEzJg4W';

async function sbFetch(path) {
  var r = await fetch(SUPA_URL+path, {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

var POINTS = [1,2,4,8,16,32];
var ROUND_LABELS = ['Advanced to Round of 32','Advanced to Sweet 16','Advanced to Elite 8','Advanced to Final Four','Advanced to Championship','Champion'];
var ROUND_GAME_IDS = [
  ['E1','E2','E3','E4','E5','E6','E7','E8','S1','S2','S3','S4','S5','S6','S7','S8','W1','W2','W3','W4','W5','W6','W7','W8','M1','M2','M3','M4','M5','M6','M7','M8'],
  ['ER1','ER2','ER3','ER4','SR1','SR2','SR3','SR4','WR1','WR2','WR3','WR4','MR1','MR2','MR3','MR4'],
  ['ES1','ES2','SS1','SS2','WS1','WS2','MS1','MS2'],
  ['EE1','SE1','WE1','ME1'],
  ['FF1','FF2'],
  ['CH1']
];

var brackets=[], results={}, expandedIdx=null;

async function loadAll() {
  document.getElementById('last-update').textContent='Loading...';
  try {
    var bRows = await sbFetch('/rest/v1/brackets?select=*&order=created_at.asc');
    var rRows = await sbFetch('/rest/v1/results?select=*');
    brackets = bRows||[];
    results = {};
    (rRows||[]).forEach(function(r){ results[r.game_id]=r.winning_team; });
    document.getElementById('last-update').textContent='Updated '+new Date().toLocaleTimeString()+' - '+brackets.length+' entries';
    render();
  } catch(e) {
    document.getElementById('content').innerHTML='<div class="msg" style="color:#c00">Error: '+e.message+'</div>';
  }
}

function scoreEntry(picks) {
  var total=0, byRound=[0,0,0,0,0,0], correct=0, gamesScored=0;
  ROUND_GAME_IDS.forEach(function(ids,ri) {
    ids.forEach(function(gid) {
      var pick=picks[gid], actual=results[gid];
      if(actual) {
        gamesScored++;
        if(pick===actual){ total+=POINTS[ri]; byRound[ri]+=POINTS[ri]; correct++; }
      }
    });
  });
  return {total:total,byRound:byRound,correct:correct,gamesScored:gamesScored};
}

function maxPossible(picks) {
  var eliminated={};
  ROUND_GAME_IDS.forEach(function(ids,ri) {
    ids.forEach(function(gid) {
      var actual=results[gid];
      if(!actual) return;
      var pick=picks[gid];
      if(pick && pick!==actual) eliminated[pick]=true;
    });
  });
  var possible=0;
  ROUND_GAME_IDS.forEach(function(ids,ri) {
    ids.forEach(function(gid) {
      if(results[gid]) return;
      var pick=picks[gid];
      if(pick && !eliminated[pick]) possible+=POINTS[ri];
    });
  });
  return possible;
}

function buildExpandHtml(picks) {
  // Build set of eliminated teams - any team that lost a completed game
  var eliminated = {};
  ROUND_GAME_IDS.forEach(function(ids,ri) {
    ids.forEach(function(gid) {
      var actual = results[gid];
      if(!actual) return;
      // The loser is whoever the player picked that wasn't the winner,
      // but we need ALL losers not just this player's picks.
      // We know the winner; the loser is whatever team played against them.
      // Since we only have winner names in results{}, we track it this way:
      // any team that a player picked in ANY completed game and LOST is eliminated.
      // But we also need teams eliminated even if player didn't pick them.
      // Best approach: a team is eliminated if they appear as a pick in a
      // completed game where they didn't win.
      var pick = picks[gid];
      if(pick && pick !== actual) eliminated[pick] = true;
    });
  });
  // Also mark teams eliminated based on ALL completed results:
  // if a team won a game, they are NOT eliminated. Any team that was
  // the opponent in a completed game but didn't win IS eliminated.
  // We can infer this from picks across all rounds - if someone picked
  // team X to win game G and team X lost, X is out for all future rounds.
  // The above loop already handles this for this player's picks.
  // That's the right approach - we only care about teams THIS player picked.

  var html='<div class="expand-panel">';
  ROUND_GAME_IDS.forEach(function(ids,ri) {
    var roundPicks=ids.filter(function(gid){ return picks[gid]; });
    if(roundPicks.length===0) return;
    html+='<div class="round-section">';
    html+='<div class="round-title">'+ROUND_LABELS[ri]+'</div>';
    html+='<div class="pick-grid">';
    ids.forEach(function(gid) {
      var pick=picks[gid];
      if(!pick) return;
      var actual=results[gid];
      var cls, dotCls, teamCls, note='';

      if(actual) {
        // Game has been played
        if(pick===actual) {
          cls='pick-correct'; dotCls='dot-correct'; teamCls='correct';
        } else {
          cls='pick-wrong'; dotCls='dot-wrong'; teamCls='wrong';
        }
      } else if(eliminated[pick]) {
        // Game not played yet but this team was already knocked out earlier
        cls='pick-wrong'; dotCls='dot-wrong'; teamCls='wrong';
        note=' (eliminated)';
      } else {
        // Game not played, team still alive
        cls='pick-pending'; dotCls='dot-pending'; teamCls='pending';
      }

      html+='<div class="pick-item '+cls+'">';
      html+='<div class="pick-dot '+dotCls+'"></div>';
      html+='<span class="pick-team '+teamCls+'">'+pick+note+'</span>';
      html+='<span class="pick-gid">'+gid+'</span>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

function render() {
  var entries=brackets.filter(function(b){ return b.submitted===true||b.submitted==='true'||b.champion; });
  var gamesPlayed=Object.keys(results).length;

  var scored=entries.map(function(b) {
    var s=scoreEntry(b.picks||{});
    var mp=maxPossible(b.picks||{});
    return {id:b.id,player_name:b.player_name,champion:b.champion,picks:b.picks||{},
            total:s.total,byRound:s.byRound,correct:s.correct,gamesScored:s.gamesScored,maxPossible:mp};
  }).sort(function(a,b){ return b.total-a.total||(b.maxPossible-a.maxPossible); });

  var html='';
  html+='<div class="stats-bar">';
  html+='<div class="stat-box"><div class="stat-num">'+brackets.length+'</div><div class="stat-lbl">Entries</div></div>';
  html+='<div class="stat-box"><div class="stat-num">'+gamesPlayed+'</div><div class="stat-lbl">Games Played</div></div>';
  html+='<div class="stat-box"><div class="stat-num">'+(63-gamesPlayed)+'</div><div class="stat-lbl">Remaining</div></div>';
  html+='<div class="stat-box"><div class="stat-num">'+(scored[0]?scored[0].total:0)+'</div><div class="stat-lbl">Top Score</div></div>';
  html+='</div>';

  if(scored.length===0) {
    html+='<div class="msg">No entries yet</div>';
    document.getElementById('content').innerHTML=html;
    return;
  }

  html+='<p style="font-size:11px;color:#aaa;margin-bottom:8px;text-align:right">Click a name to see picks</p>';
  html+='<table class="lb-table"><thead><tr>';
  html+='<th></th><th>Name</th><th>Champion Pick</th>';
  ['R64','R32','S16','E8','FF','Champ'].forEach(function(r){ html+='<th class="r">'+r+'</th>'; });
  html+='<th class="r">Total</th><th class="r">Max Left</th>';
  html+='</tr></thead><tbody>';

  scored.forEach(function(entry,i) {
    var rank=i+1;
    var medal=rank===1?'&#127945;':rank===2?'&#127946;':rank===3?'&#127947;':''+rank;
    var accPct=entry.gamesScored>0?Math.round(entry.correct/entry.gamesScored*100):0;
    var isExpanded=(expandedIdx===i);

    html+='<tr class="data-row" onclick="toggleExpand('+i+')">';
    html+='<td class="rank">'+medal+'</td>';
    html+='<td><div class="pname">'+entry.player_name+(isExpanded?' &#9650;':' &#9660;')+'</div>';
    html+='<div class="prog-wrap"><div class="prog-fill" style="width:'+accPct+'%"></div></div></td>';
    html+='<td><div class="champ">'+(entry.champion||'-')+'</div></td>';
    entry.byRound.forEach(function(pts) {
      html+='<td class="r"><span style="font-family:Oswald,sans-serif;font-weight:600;font-size:13px;color:'+(pts>0?'#000':'#ccc')+'">'+(pts||'-')+'</span></td>';
    });
    html+='<td class="score">'+entry.total+'</td>';
    html+='<td class="maxleft">+'+entry.maxPossible+'</td>';
    html+='</tr>';

    if(isExpanded) {
      html+='<tr class="expand-row"><td colspan="10">'+buildExpandHtml(entry.picks)+'</td></tr>';
    }
  });

  html+='</tbody></table>';
  document.getElementById('content').innerHTML=html;
  window._scored=scored;
}

function toggleExpand(i) {
  expandedIdx=(expandedIdx===i)?null:i;
  render();
}

loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
